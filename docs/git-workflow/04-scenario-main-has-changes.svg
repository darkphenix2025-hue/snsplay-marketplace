<svg viewBox="0 0 1400 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowGreen3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="arrowBlue3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="arrowPurple3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7B1FA2"/>
    </marker>
    <linearGradient id="mainGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="wt1Grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="wt2Grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="700" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">场景 3: 主线有变更 + Worktree(s) 有变更</text>
  <text x="700" y="60" text-anchor="middle" font-size="14" fill="#666">主线已提交新内容，worktree 需要同步后再合并</text>

  <!-- Phase 1: Initial State - Main has new commits -->
  <g transform="translate(50, 80)">
    <text x="0" y="-10" font-size="16" font-weight="bold" fill="#333">阶段 1: 初始状态 (main 有新提交 C，wt-1 有 B1)</text>
    <rect x="0" y="0" width="1300" height="140" rx="10" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>

    <!-- Main with new commit C -->
    <g transform="translate(20, 20)">
      <text x="0" y="-8" font-size="12" font-weight="bold" fill="#2E7D32">main</text>
      <rect x="0" y="0" width="500" height="35" rx="5" fill="#E8F5E9" stroke="#4CAF50"/>
      <circle cx="25" cy="17.5" r="7" fill="#4CAF50"/>
      <text x="25" y="22" text-anchor="middle" font-size="9" fill="white">A</text>
      <line x1="32" y1="17.5" x2="120" y2="17.5" stroke="#4CAF50" stroke-width="2"/>
      <circle cx="135" cy="17.5" r="9" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
      <text x="135" y="22" text-anchor="middle" font-size="9" fill="white">C</text>
      <text x="150" y="22" font-size="10" fill="#F57C00">← 主线新提交</text>
      <line x1="144" y1="17.5" x2="468" y2="17.5" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4,2"/>
    </g>

    <!-- WT1 with B1 -->
    <g transform="translate(20, 55)">
      <text x="0" y="-8" font-size="12" font-weight="bold" fill="#1565C0">wt-1 (feature-A)</text>
      <rect x="0" y="0" width="500" height="35" rx="5" fill="#E3F2FD" stroke="#2196F3"/>
      <circle cx="25" cy="17.5" r="7" fill="#2196F3"/>
      <text x="25" y="22" text-anchor="middle" font-size="9" fill="white">A</text>
      <line x1="32" y1="17.5" x2="200" y2="17.5" stroke="#2196F3" stroke-width="2"/>
      <circle cx="220" cy="17.5" r="9" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
      <text x="220" y="22" text-anchor="middle" font-size="9" fill="white">B1✓</text>
      <text x="240" y="22" font-size="10" fill="#F57C00">⚠️ 落后于 main (缺少 C)</text>
      <line x1="229" y1="17.5" x2="468" y2="17.5" stroke="#2196F3" stroke-width="2" stroke-dasharray="4,2"/>
    </g>

    <!-- WT2 unchanged -->
    <g transform="translate(20, 90)">
      <text x="0" y="-8" font-size="12" font-weight="bold" fill="#7B1FA2">wt-2 (feature-B)</text>
      <rect x="0" y="0" width="500" height="35" rx="5" fill="#F3E5F5" stroke="#9C27B0"/>
      <circle cx="25" cy="17.5" r="7" fill="#9C27B0"/>
      <text x="25" y="22" text-anchor="middle" font-size="9" fill="white">A</text>
      <line x1="32" y1="17.5" x2="468" y2="17.5" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4,2"/>
      <text x="50" y="22" font-size="10" fill="#9E9E9E">无变更</text>
    </g>

    <!-- Status Note -->
    <text x="520" y="45" font-size="12" fill="#2E7D32">✅ main 有进展 (C)</text>
    <text x="520" y="70" font-size="12" fill="#1565C0">✅ wt-1 有进展 (B1)</text>
    <text x="520" y="95" font-size="12" fill="#F57C00">⚠️ 需要同步后合并</text>
  </g>

  <!-- Phase 2: Sync WT1 to Main -->
  <g transform="translate(50, 240)">
    <text x="0" y="-10" font-size="16" font-weight="bold" fill="#333">阶段 2: 同步 wt-1 到最新 main (git rebase 或 git merge)</text>
    <rect x="0" y="0" width="1300" height="180" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>

    <!-- Option A: Rebase -->
    <g transform="translate(20, 20)">
      <text x="0" y="-8" font-size="12" font-weight="bold" fill="#F57C00">选项 A: git rebase origin/main (推荐)</text>
      <rect x="0" y="0" width="600" height="50" rx="5" fill="#FFE0B2" stroke="#FF9800"/>
      <circle cx="25" cy="25" r="7" fill="#4CAF50"/>
      <text x="25" y="30" text-anchor="middle" font-size="9" fill="white">A</text>
      <line x1="32" y1="25" x2="100" y2="25" stroke="#4CAF50" stroke-width="2"/>
      <circle cx="115" cy="25" r="8" fill="#4CAF50"/>
      <text x="115" y="30" text-anchor="middle" font-size="9" fill="white">C</text>
      <line x1="123" y1="25" x2="250" y2="25" stroke="#2196F3" stroke-width="2"/>
      <circle cx="270" cy="25" r="9" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
      <text x="270" y="30" text-anchor="middle" font-size="9" fill="white">B1</text>
      <text x="300" y="30" font-size="10" fill="#2E7D32">✅ 线性历史</text>
    </g>

    <!-- Option B: Merge -->
    <g transform="translate(20, 85)">
      <text x="0" y="-8" font-size="12" font-weight="bold" fill="#F57C00">选项 B: git merge origin/main</text>
      <rect x="0" y="0" width="600" height="50" rx="5" fill="#FFE0B2" stroke="#FF9800"/>
      <circle cx="25" cy="25" r="7" fill="#4CAF50"/>
      <text x="25" y="30" text-anchor="middle" font-size="9" fill="white">A</text>
      <line x1="32" y1="25" x2="100" y2="25" stroke="#4CAF50" stroke-width="2"/>
      <circle cx="115" cy="25" r="8" fill="#4CAF50"/>
      <text x="115" y="30" text-anchor="middle" font-size="9" fill="white">C</text>
      <line x1="123" y1="25" x2="200" y2="25" stroke="#4CAF50" stroke-width="2"/>
      <line x1="32" y1="25" x2="80" y2="40" stroke="#2196F3" stroke-width="2"/>
      <circle cx="100" cy="40" r="8" fill="#1565C0"/>
      <text x="100" y="45" text-anchor="middle" font-size="9" fill="white">B1</text>
      <circle cx="270" cy="25" r="9" fill="#FF9800" stroke="#F57C00" stroke-width="2"/>
      <text x="270" y="30" text-anchor="middle" font-size="9" fill="white">Merge</text>
      <text x="300" y="30" font-size="10" fill="#F57C00">⚠️ 合并提交</text>
    </g>

    <!-- Command -->
    <text x="650" y="45" font-size="11" fill="#F57C00" font-family="monospace"># 在 wt-1 中执行</text>
    <text x="650" y="65" font-size="11" fill="#F57C00" font-family="monospace">cd .worktrees/feature-A</text>
    <text x="650" y="85" font-size="11" fill="#F57C00" font-family="monospace">git fetch origin</text>
    <text x="650" y="105" font-size="11" fill="#2E7D32" font-family="monospace">git rebase origin/main  # 推荐</text>
    <text x="650" y="125" font-size="11" fill="#1565C0" font-family="monospace"># 或</text>
    <text x="650" y="145" font-size="11" fill="#FF9800" font-family="monospace">git merge origin/main   # 保留合并历史</text>
    <text x="650" y="170" font-size="11" fill="#9E9E9E" font-family="monospace"># 如有冲突：解决后 git rebase --continue</text>
  </g>

  <!-- Phase 3: Merge WT1 to Main -->
  <g transform="translate(50, 440)">
    <text x="0" y="-10" font-size="16" font-weight="bold" fill="#333">阶段 3: 合并 wt-1 到 main</text>
    <rect x="0" y="0" width="1300" height="140" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>

    <!-- Main after merge -->
    <g transform="translate(20, 20)">
      <text x="0" y="-8" font-size="12" font-weight="bold" fill="#2E7D32">main</text>
      <rect x="0" y="0" width="600" height="35" rx="5" fill="#C8E6C9" stroke="#2E7D32"/>
      <circle cx="25" cy="17.5" r="7" fill="#4CAF50"/>
      <text x="25" y="22" text-anchor="middle" font-size="9" fill="white">A</text>
      <line x1="32" y1="17.5" x2="100" y2="17.5" stroke="#4CAF50" stroke-width="2"/>
      <circle cx="115" cy="17.5" r="8" fill="#2E7D32"/>
      <text x="115" y="22" text-anchor="middle" font-size="9" fill="white">C</text>
      <line x1="123" y1="17.5" x2="250" y2="17.5" stroke="#4CAF50" stroke-width="2"/>
      <circle cx="270" cy="17.5" r="10" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
      <text x="270" y="22" text-anchor="middle" font-size="9" fill="white">B1</text>
      <text x="300" y="22" font-size="10" fill="#2E7D32">← wt-1 已合并</text>
      <line x1="280" y1="17.5" x2="568" y2="17.5" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4,2"/>
    </g>

    <!-- WT1 -->
    <g transform="translate(20, 55)">
      <text x="0" y="-8" font-size="12" font-weight="bold" fill="#1565C0">wt-1</text>
      <rect x="0" y="0" width="600" height="35" rx="5" fill="#E1F5FE" stroke="#1565C0"/>
      <circle cx="25" cy="17.5" r="7" fill="#4CAF50"/>
      <text x="25" y="22" text-anchor="middle" font-size="9" fill="white">A</text>
      <line x1="32" y1="17.5" x2="100" y2="17.5" stroke="#4CAF50" stroke-width="2"/>
      <circle cx="115" cy="17.5" r="8" fill="#4CAF50"/>
      <text x="115" y="22" text-anchor="middle" font-size="9" fill="white">C</text>
      <line x1="123" y1="17.5" x2="250" y2="17.5" stroke="#2196F3" stroke-width="2"/>
      <circle cx="270" cy="17.5" r="9" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
      <text x="270" y="22" text-anchor="middle" font-size="9" fill="white">B1</text>
      <text x="300" y="22" font-size="10" fill="#4CAF50">✅ 与 main 同步</text>
    </g>

    <!-- WT2 needs sync -->
    <g transform="translate(20, 90)">
      <text x="0" y="-8" font-size="12" font-weight="bold" fill="#7B1FA2">wt-2</text>
      <rect x="0" y="0" width="600" height="35" rx="5" fill="#F3E5F5" stroke="#9C27B0"/>
      <circle cx="25" cy="17.5" r="7" fill="#9C27B0"/>
      <text x="25" y="22" text-anchor="middle" font-size="9" fill="white">A</text>
      <text x="50" y="22" font-size="10" fill="#F57C00">⚠️ 仍需同步 (缺少 C 和 B1)</text>
      <line x1="32" y1="17.5" x2="568" y2="17.5" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4,2"/>
    </g>

    <!-- Command -->
    <text x="650" y="45" font-size="11" fill="#2E7D32" font-family="monospace"># 切换到 main 合并</text>
    <text x="650" y="65" font-size="11" fill="#2E7D32" font-family="monospace">cd /projects/snsplay-marketplace</text>
    <text x="650" y="85" font-size="11" fill="#2E7D32" font-family="monospace">git merge feature-A --no-ff -m "Merge feature-A"</text>
    <text x="650" y="105" font-size="11" fill="#2E7D32" font-family="monospace">git push origin main feature-A</text>
    <text x="650" y="130" font-size="11" fill="#F57C00" font-family="monospace"># wt-2 现在需要 rebase 获取 C 和 B1</text>
  </g>

  <!-- Phase 4: Both WT have changes + Main has changes -->
  <g transform="translate(50, 600)">
    <text x="0" y="-10" font-size="16" font-weight="bold" fill="#333">阶段 4: 复杂场景 - main 有 C，wt-1 有 B1，wt-2 有 B2</text>
    <rect x="0" y="0" width="1300" height="220" rx="10" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>

    <!-- Final State -->
    <g transform="translate(20, 20)">
      <text x="0" y="-8" font-size="12" font-weight="bold" fill="#2E7D32">最终 main 状态</text>
      <rect x="0" y="0" width="800" height="40" rx="5" fill="#C8E6C9" stroke="#2E7D32"/>
      <circle cx="30" cy="20" r="8" fill="#4CAF50"/>
      <text x="30" y="25" text-anchor="middle" font-size="10" fill="white">A</text>
      <line x1="38" y1="20" x2="100" y2="20" stroke="#4CAF50" stroke-width="2"/>
      <circle cx="120" cy="20" r="9" fill="#2E7D32"/>
      <text x="120" y="25" text-anchor="middle" font-size="10" fill="white">C</text>
      <line x1="129" y1="20" x2="230" y2="20" stroke="#4CAF50" stroke-width="2"/>
      <circle cx="250" cy="20" r="10" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
      <text x="250" y="25" text-anchor="middle" font-size="10" fill="white">B1</text>
      <line x1="260" y1="20" x2="380" y2="20" stroke="#4CAF50" stroke-width="2"/>
      <circle cx="400" cy="20" r="10" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
      <text x="400" y="25" text-anchor="middle" font-size="10" fill="white">B2</text>
      <text x="430" y="25" font-size="10" fill="#2E7D32">← 所有功能已合并</text>
    </g>

    <!-- Complete Command Sequence -->
    <g transform="translate(20, 75)">
      <rect x="0" y="0" width="1260" height="130" rx="8" fill="#263238" stroke="#546E7A"/>
      <text x="630" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#80CBC4">完整命令序列 - 最复杂场景</text>

      <text x="20" y="50" font-size="11" fill="#FF9800" font-family="monospace"># 步骤 1: 同步 wt-1 到最新 main (获取 C)</text>
      <text x="20" y="68" font-size="10" fill="#E8F5E9" font-family="monospace">cd .worktrees/feature-A &amp;&amp; git fetch origin &amp;&amp; git rebase origin/main</text>

      <text x="20" y="88" font-size="11" fill="#2196F3" font-family="monospace"># 步骤 2: 合并 wt-1 到 main</text>
      <text x="20" y="106" font-size="10" fill="#E8F5E9" font-family="monospace">cd .. &amp;&amp; git merge feature-A --no-ff -m "Merge feature-A" &amp;&amp; git push origin main</text>

      <text x="20" y="126" font-size="11" fill="#9C27B0" font-family="monospace"># 步骤 3: 同步 wt-2 到最新 main (获取 C 和 B1)</text>
      <text x="20" y="144" font-size="10" fill="#E8F5E9" font-family="monospace">cd .worktrees/feature-B &amp;&amp; git fetch origin &amp;&amp; git rebase origin/main</text>

      <text x="20" y="164" font-size="11" fill="#7B1FA2" font-family="monospace"># 步骤 4: 提交 wt-2 并合并到 main</text>
      <text x="20" y="182" font-size="10" fill="#E8F5E9" font-family="monospace">cd .. &amp;&amp; cd .worktrees/feature-B &amp;&amp; git add . &amp;&amp; git commit -m "feat: B complete"</text>
      <text x="20" y="197" font-size="10" fill="#E8F5E9" font-family="monospace">cd .. &amp;&amp; git merge feature-B --no-ff -m "Merge feature-B" &amp;&amp; git push origin main</text>
    </g>
  </g>

  <!-- Key Points Summary -->
  <g transform="translate(50, 840)">
    <rect x="0" y="0" width="1300" height="160" rx="10" fill="#FFFDE7" stroke="#FBC02D" stroke-width="2"/>
    <text x="650" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#F57C00">关键要点总结</text>

    <g transform="translate(40, 50)">
      <!-- Point 1 -->
      <rect x="0" y="0" width="380" height="45" rx="5" fill="#E3F2FD" stroke="#2196F3"/>
      <text x="20" y="20" font-size="13" font-weight="bold" fill="#1565C0">1. 先同步，后合并</text>
      <text x="20" y="38" font-size="11" fill="#333">任何 worktree 合并前必须先 rebase/merge main</text>

      <!-- Point 2 -->
      <rect x="420" y="0" width="380" height="45" rx="5" fill="#E8F5E9" stroke="#4CAF50"/>
      <text x="440" y="20" font-size="13" font-weight="bold" fill="#2E7D32">2. 串行合并非并行</text>
      <text x="440" y="38" font-size="11" fill="#333">一次合并一个分支，避免冲突叠加</text>

      <!-- Point 3 -->
      <rect x="840" y="0" width="420" height="45" rx="5" fill="#F3E5F5" stroke="#9C27B0"/>
      <text x="860" y="20" font-size="13" font-weight="bold" fill="#7B1FA2">3. 每个 worktree 独立同步</text>
      <text x="860" y="38" font-size="11" fill="#333">合并完一个后，其他 worktree 需重新同步</text>

      <!-- Point 4 -->
      <rect x="0" y="55" width="380" height="45" rx="5" fill="#FFE0B2" stroke="#FF9800"/>
      <text x="20" y="75" font-size="13" font-weight="bold" fill="#F57C00">4. Rebase 优于 Merge</text>
      <text x="20" y="93" font-size="11" fill="#333">保持线性历史，更清晰</text>

      <!-- Point 5 -->
      <rect x="420" y="55" width="380" height="45" rx="5" fill="#FFEBEE" stroke="#F44336"/>
      <text x="440" y="75" font-size="13" font-weight="bold" fill="#C62828">5. 冲突处理</text>
      <text x="440" y="93" font-size="11" fill="#333">rebase 遇冲突：解决后 --continue</text>

      <!-- Point 6 -->
      <rect x="840" y="55" width="420" height="45" rx="5" fill="#E0F7FA" stroke="#00BCD4"/>
      <text x="860" y="75" font-size="13" font-weight="bold" fill="#00838F">6. 推送远程</text>
      <text x="860" y="93" font-size="11" fill="#333">每次合并后推送 main 和对应分支</text>
    </g>
  </g>
</svg>
