<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="wt1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="wt2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="700" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">场景 1: 主线无变更，单个 Worktree 有变更</text>

  <!-- Timeline header -->
  <text x="700" y="60" text-anchor="middle" font-size="14" fill="#666">提交 &amp; 合并流程 (wt-1 有功能完成)</text>

  <!-- Main Branch Timeline -->
  <g transform="translate(100, 100)">
    <text x="0" y="-10" font-size="14" font-weight="bold" fill="#2E7D32">main</text>
    <rect x="0" y="0" width="600" height="50" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="30" cy="25" r="8" fill="#4CAF50"/>
    <text x="30" y="30" text-anchor="middle" font-size="10" fill="white">A</text>
    <line x1="38" y1="25" x2="562" y2="25" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
    <circle cx="570" cy="25" r="8" fill="#4CAF50"/>
    <text x="570" y="30" text-anchor="middle" font-size="10" fill="white">A</text>
  </g>

  <!-- Worktree 1 Timeline -->
  <g transform="translate(100, 200)">
    <text x="0" y="-10" font-size="14" font-weight="bold" fill="#1565C0">wt-1 (feature-A)</text>
    <rect x="0" y="0" width="600" height="50" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
    <circle cx="30" cy="25" r="8" fill="#2196F3"/>
    <text x="30" y="30" text-anchor="middle" font-size="10" fill="white">A</text>
    <line x1="38" y1="25" x2="250" y2="25" stroke="#2196F3" stroke-width="3"/>
    <circle cx="280" cy="25" r="10" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
    <text x="280" y="30" text-anchor="middle" font-size="10" fill="white">B1</text>
    <text x="280" y="45" text-anchor="middle" font-size="10" fill="#1565C0">✅ 提交</text>
    <line x1="290" y1="25" x2="562" y2="25" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,3"/>
  </g>

  <!-- Worktree 2 Timeline -->
  <g transform="translate(100, 300)">
    <text x="0" y="-10" font-size="14" font-weight="bold" fill="#7B1FA2">wt-2 (feature-B)</text>
    <rect x="0" y="0" width="600" height="50" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
    <circle cx="30" cy="25" r="8" fill="#9C27B0"/>
    <text x="30" y="30" text-anchor="middle" font-size="10" fill="white">A</text>
    <line x1="38" y1="25" x2="562" y2="25" stroke="#9C27B0" stroke-width="3" stroke-dasharray="5,3"/>
    <circle cx="570" cy="25" r="8" fill="#9C27B0"/>
    <text x="570" y="30" text-anchor="middle" font-size="10" fill="white">A</text>
  </g>

  <!-- Merge Arrow -->
  <path d="M 280 225 L 280 260 L 80 260 L 80 150" stroke="#1565C0" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="295" y="250" font-size="12" fill="#1565C0">1. 提交</text>
  <text x="95" y="250" font-size="12" fill="#2E7D32">2. 合并到 main</text>

  <!-- Step Box -->
  <g transform="translate(750, 100)">
    <rect x="0" y="0" width="550" height="280" rx="10" fill="#FAFAFA" stroke="#9E9E9E" stroke-width="2"/>
    <text x="275" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">操作步骤</text>

    <!-- Step 1 -->
    <rect x="20" y="50" width="510" height="60" rx="5" fill="#E3F2FD" stroke="#2196F3"/>
    <text x="40" y="75" font-size="14" font-weight="bold" fill="#1565C0">步骤 1: 在 wt-1 中提交更改</text>
    <text x="40" y="95" font-size="11" fill="#333">cd .worktrees/feature-A &amp;&amp; git add . &amp;&amp; git commit -m "feat: xxx"</text>

    <!-- Step 2 -->
    <rect x="20" y="125" width="510" height="60" rx="5" fill="#E8F5E9" stroke="#4CAF50"/>
    <text x="40" y="150" font-size="14" font-weight="bold" fill="#2E7D32">步骤 2: 切换到 main 并合并</text>
    <text x="40" y="170" font-size="11" fill="#333">cd /projects/snsplay-marketplace &amp;&amp; git merge feature-A --no-ff</text>

    <!-- Step 3 -->
    <rect x="20" y="200" width="510" height="60" rx="5" fill="#FFF3E0" stroke="#FF9800"/>
    <text x="40" y="225" font-size="14" font-weight="bold" fill="#F57C00">步骤 3: 推送到远程</text>
    <text x="40" y="245" font-size="11" fill="#333">git push origin main feature-A</text>
  </g>

  <!-- Status Legend -->
  <g transform="translate(100, 400)">
    <rect x="0" y="0" width="550" height="120" rx="10" fill="#FFFDE7" stroke="#FBC02D" stroke-width="1"/>
    <text x="275" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#F57C00">状态说明</text>

    <circle cx="30" cy="55" r="6" fill="#4CAF50"/>
    <text x="50" y="60" font-size="12" fill="#333">= 无变更</text>

    <circle cx="150" cy="55" r="6" fill="#1565C0"/>
    <text x="170" y="60" font-size="12" fill="#333">= 有变更待提交</text>

    <circle cx="320" cy="55" r="6" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
    <text x="340" y="60" font-size="12" fill="#333">= 已提交</text>

    <line x1="30" y1="80" x2="60" y2="80" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="70" y="85" font-size="12" fill="#333">= 无新提交 (与原点相同)</text>

    <line x1="300" y1="80" x2="330" y2="80" stroke="#2196F3" stroke-width="3"/>
    <text x="340" y="85" font-size="12" fill="#333">= 有新提交</text>

    <path d="M 30 105 L 50 105" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="60" y="110" font-size="12" fill="#333">= 合并方向</text>
  </g>

  <!-- Command Box -->
  <g transform="translate(750, 400)">
    <rect x="0" y="0" width="550" height="120" rx="10" fill="#263238" stroke="#546E7A" stroke-width="2"/>
    <text x="275" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#80CBC4">完整命令序列</text>

    <text x="20" y="50" font-size="10" fill="#80CBC4" font-family="monospace"># 在 wt-1 中提交</text>
    <text x="20" y="65" font-size="10" fill="#E8F5E9" font-family="monospace">cd .worktrees/feature-A</text>
    <text x="20" y="80" font-size="10" fill="#E8F5E9" font-family="monospace">git add . &amp;&amp; git commit -m "feat: feature-A complete"</text>

    <text x="20" y="100" font-size="10" fill="#80CBC4" font-family="monospace"># 切换到 main 并合并</text>
    <text x="20" y="115" font-size="10" fill="#E8F5E9" font-family="monospace">cd .. &amp;&amp; git merge feature-A --no-ff -m "Merge feature-A"</text>
  </g>
</svg>
