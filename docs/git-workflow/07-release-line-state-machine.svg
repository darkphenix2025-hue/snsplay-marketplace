<svg viewBox="0 0 1400 1600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowSeq" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="arrowHotfix" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F44336"/>
    </marker>
    <marker id="arrowSync" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9800"/>
    </marker>
    <linearGradient id="mainLineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="prodLineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="700" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">发布线状态机：main ↔ production 时序图</text>
  <text x="700" y="60" text-anchor="middle" font-size="14" fill="#666">三组状态变迁规则详解</text>

  <!-- ==================== 规则 1: Main 更新流程 ==================== -->
  <g transform="translate(50, 90)">
    <rect x="0" y="0" width="1300" height="280" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
    <text x="650" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2E7D32">规则 1: Main 更新流程 (Sync → MainUpdated → Sync)</text>

    <!-- Lifelines -->
    <line x1="300" y1="60" x2="300" y2="250" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
    <line x1="700" y1="60" x2="700" y2="250" stroke="#FF9800" stroke-width="3" stroke-dasharray="5,3"/>

    <!-- Main lifeline box -->
    <rect x="240" y="50" width="120" height="30" rx="5" fill="url(#mainLineGrad)" stroke="#2E7D32"/>
    <text x="300" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="white">main</text>

    <!-- Production lifeline box -->
    <rect x="620" y="50" width="160" height="30" rx="5" fill="url(#prodLineGrad)" stroke="#F57C00"/>
    <text x="700" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="white">production</text>

    <!-- Time sequence -->
    <g transform="translate(0, 50)">
      <!-- Initial Sync State -->
      <circle cx="300" cy="100" r="12" fill="#4CAF50"/>
      <text x="300" y="105" text-anchor="middle" font-size="12" fill="white">A</text>
      <circle cx="700" cy="100" r="12" fill="#FF9800"/>
      <text x="700" y="105" text-anchor="middle" font-size="12" fill="white">A</text>
      <text x="500" y="105" text-anchor="middle" font-size="12" fill="#666">Sync 状态 (main == production)</text>

      <!-- Main gets new commit D -->
      <circle cx="300" cy="150" r="12" fill="#2E7D32"/>
      <text x="300" y="155" text-anchor="middle" font-size="12" fill="white">D</text>
      <text x="380" y="155" font-size="12" fill="#2E7D32">← 功能合并完成</text>
      <line x1="300" y1="100" x2="300" y2="150" stroke="#4CAF50" stroke-width="3"/>

      <!-- Git tag action -->
      <rect x="320" y="165" width="200" height="35" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
      <text x="420" y="180" text-anchor="middle" font-size="11" fill="#F57C00" font-family="monospace">git tag -a v1.1.0</text>
      <text x="420" y="195" text-anchor="middle" font-size="11" fill="#F57C00" font-family="monospace">git push origin v1.1.0</text>

      <!-- Arrow to production -->
      <line x1="300" y1="162" x2="700" y2="162" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowSeq)"/>
      <text x="500" y="155" text-anchor="middle" font-size="11" fill="#2E7D32">发布</text>

      <!-- Production updated -->
      <circle cx="700" cy="210" r="12" fill="#F57C00"/>
      <text x="700" y="215" text-anchor="middle" font-size="12" fill="white">D</text>
      <text x="780" y="215" font-size="12" fill="#F57C00">← v1.1.0 已发布</text>
      <line x1="700" y1="100" x2="700" y2="210" stroke="#FF9800" stroke-width="3"/>

      <!-- Sync again -->
      <rect x="450" y="230" width="400" height="30" rx="5" fill="#C8E6C9" stroke="#4CAF50"/>
      <text x="650" y="250" text-anchor="middle" font-size="12" fill="#2E7D32">✅ Sync 状态恢复 (main == production == v1.1.0)</text>
    </g>
  </g>

  <!-- ==================== 规则 2: Production Hotfix 流程 ==================== -->
  <g transform="translate(50, 390)">
    <rect x="0" y="0" width="1300" height="320" rx="10" fill="#FFEBEE" stroke="#F44336" stroke-width="2"/>
    <text x="650" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#C62828">规则 2: Production Hotfix 流程 (Sync → ProdHotfixed → Sync)</text>

    <!-- Lifelines -->
    <line x1="300" y1="60" x2="300" y2="290" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
    <line x1="700" y1="60" x2="700" y2="290" stroke="#FF9800" stroke-width="3" stroke-dasharray="5,3"/>

    <!-- Main lifeline box -->
    <rect x="240" y="50" width="120" height="30" rx="5" fill="url(#mainLineGrad)" stroke="#2E7D32"/>
    <text x="300" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="white">main</text>

    <!-- Production lifeline box -->
    <rect x="620" y="50" width="160" height="30" rx="5" fill="url(#prodLineGrad)" stroke="#F57C00"/>
    <text x="700" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="white">production</text>

    <!-- Time sequence -->
    <g transform="translate(0, 50)">
      <!-- Initial Sync State -->
      <circle cx="300" cy="100" r="12" fill="#4CAF50"/>
      <text x="300" y="105" text-anchor="middle" font-size="12" fill="white">A</text>
      <circle cx="700" cy="100" r="12" fill="#FF9800"/>
      <text x="700" y="105" text-anchor="middle" font-size="12" fill="white">A</text>
      <text x="500" y="105" text-anchor="middle" font-size="12" fill="#666">Sync 状态</text>

      <!-- Production finds bug -->
      <circle cx="700" cy="150" r="12" fill="#F44336" stroke="#C62828" stroke-width="2"/>
      <text x="700" y="155" text-anchor="middle" font-size="12" fill="white">H1</text>
      <text x="780" y="155" font-size="12" fill="#F44336">← ⚠️ 紧急 bug 发现</text>
      <line x1="700" y1="100" x2="700" y2="150" stroke="#FF9800" stroke-width="3"/>

      <!-- Hotfix branch -->
      <rect x="520" y="165" width="200" height="35" rx="5" fill="#FFCDD2" stroke="#F44336"/>
      <text x="620" y="180" text-anchor="middle" font-size="11" fill="#C62828" font-family="monospace">hotfix/bug-1 分支</text>
      <text x="620" y="195" text-anchor="middle" font-size="11" fill="#C62828" font-family="monospace">修复并提交</text>

      <!-- Merge to production -->
      <line x1="700" y1="200" x2="700" y2="220" stroke="#F44336" stroke-width="2" marker-end="url(#arrowHotfix)"/>
      <text x="720" y="215" font-size="11" fill="#C62828">merge</text>

      <!-- Tag -->
      <rect x="520" y="230" width="200" height="35" rx="5" fill="#FFF3E0" stroke="#FF9800"/>
      <text x="620" y="245" text-anchor="middle" font-size="11" fill="#F57C00" font-family="monospace">git tag -a v1.0.1</text>
      <text x="620" y="260" text-anchor="middle" font-size="11" fill="#F57C00" font-family="monospace">git push origin v1.0.1</text>

      <!-- Sync back to main (CRITICAL!) -->
      <line x1="700" y1="265" x2="300" y2="265" stroke="#C62828" stroke-width="2" marker-end="url(#arrowHotfix)"/>
      <text x="500" y="258" text-anchor="middle" font-size="11" fill="#C62828" font-weight="bold">⚠️ 必须同步回 main!</text>

      <!-- Main updated with hotfix -->
      <circle cx="300" cy="290" r="12" fill="#2E7D32"/>
      <text x="300" y="295" text-anchor="middle" font-size="12" fill="white">H1</text>
      <text x="380" y="295" font-size="12" fill="#2E7D32">← hotfix 已同步</text>
      <line x1="300" y1="100" x2="300" y2="290" stroke="#4CAF50" stroke-width="3"/>

      <!-- Final state -->
      <rect x="450" y="305" width="400" height="30" rx="5" fill="#C8E6C9" stroke="#4CAF50"/>
      <text x="650" y="325" text-anchor="middle" font-size="12" fill="#2E7D32">✅ Sync 状态恢复 (main == production == v1.0.1)</text>
    </g>
  </g>

  <!-- ==================== 规则 3: 双方都有更新流程 ==================== -->
  <g transform="translate(50, 730)">
    <rect x="0" y="0" width="1300" height="480" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
    <text x="650" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#F57C00">规则 3: 双方都有更新 (BothUpdated → Step1 → Step2 → Sync)</text>
    <text x="650" y="55" text-anchor="middle" font-size="13" fill="#F57C00">最复杂场景：main 有功能开发中 + production 有紧急 hotfix</text>

    <!-- Lifelines -->
    <line x1="300" y1="80" x2="300" y2="450" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
    <line x1="700" y1="80" x2="700" y2="450" stroke="#FF9800" stroke-width="3" stroke-dasharray="5,3"/>

    <!-- Main lifeline box -->
    <rect x="240" y="70" width="120" height="30" rx="5" fill="url(#mainLineGrad)" stroke="#2E7D32"/>
    <text x="300" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="white">main</text>

    <!-- Production lifeline box -->
    <rect x="620" y="70" width="160" height="30" rx="5" fill="url(#prodLineGrad)" stroke="#F57C00"/>
    <text x="700" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="white">production</text>

    <!-- Time sequence -->
    <g transform="translate(0, 70)">
      <!-- Initial BothUpdated State -->
      <circle cx="300" cy="50" r="12" fill="#2E7D32"/>
      <text x="300" y="55" text-anchor="middle" font-size="12" fill="white">D</text>
      <circle cx="700" cy="50" r="12" fill="#F44336" stroke="#C62828" stroke-width="2"/>
      <text x="700" y="55" text-anchor="middle" font-size="12" fill="white">H1</text>
      <text x="500" y="55" text-anchor="middle" font-size="12" fill="#F57C00">⚠️ BothUpdated 状态</text>
      <text x="500" y="70" text-anchor="middle" font-size="11" fill="#666">main 有 D (开发中) + production 有 H1 (hotfix)</text>

      <!-- ========== Step 1 ========== -->
      <rect x="100" y="90" width="1100" height="180" rx="8" fill="#FFEBEE" stroke="#F44336" stroke-width="2"/>
      <text x="650" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">Step 1: hotfix → main (保留 main 的 D 提交)</text>

      <!-- Hotfix branch creation -->
      <circle cx="700" cy="145" r="10" fill="#F44336"/>
      <text x="700" y="150" text-anchor="middle" font-size="10" fill="white">H1</text>
      <rect x="520" y="160" width="360" height="35" rx="5" fill="#FFCDD2" stroke="#F44336"/>
      <text x="700" y="175" text-anchor="middle" font-size="11" fill="#C62828" font-family="monospace">git checkout -b hotfix/bug-1</text>
      <text x="700" y="190" text-anchor="middle" font-size="11" fill="#C62828" font-family="monospace"># 修复并提交</text>

      <!-- Merge to main with rebase -->
      <path d="M 700 205 L 700 220 L 300 220 L 300 240" stroke="#C62828" stroke-width="2" marker-end="url(#arrowHotfix)"/>
      <rect x="350" y="225" width="250" height="35" rx="5" fill="#E8F5E9" stroke="#4CAF50"/>
      <text x="475" y="240" text-anchor="middle" font-size="10" fill="#2E7D32" font-family="monospace">git rebase hotfix/bug-1</text>
      <text x="475" y="255" text-anchor="middle" font-size="10" fill="#2E7D32" font-family="monospace"># 保留 D 提交</text>

      <!-- Main after rebase -->
      <circle cx="300" cy="280" r="12" fill="#4CAF50"/>
      <text x="300" y="285" text-anchor="middle" font-size="10" fill="white">H1</text>
      <circle cx="300" cy="310" r="12" fill="#2E7D32"/>
      <text x="300" y="315" text-anchor="middle" font-size="10" fill="white">D</text>
      <text x="350" y="300" font-size="11" fill="#2E7D32">← main = H1 + D (都保留)</text>

      <!-- ========== Step 2 ========== -->
      <rect x="100" y="330" width="1100" height="140" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
      <text x="650" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Step 2: main → production (发布包含 H1+D)</text>

      <!-- Git tag -->
      <rect x="200" y="370" width="200" height="40" rx="5" fill="#FFF3E0" stroke="#FF9800"/>
      <text x="300" y="390" text-anchor="middle" font-size="10" fill="#F57C00" font-family="monospace">git tag -a v1.1.1</text>
      <text x="300" y="405" text-anchor="middle" font-size="10" fill="#F57C00" font-family="monospace">-m "Release v1.1.1"</text>

      <!-- Arrow to production -->
      <line x1="400" y1="390" x2="700" y2="390" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowSeq)"/>
      <text x="550" y="383" text-anchor="middle" font-size="11" fill="#2E7D32">发布</text>

      <!-- Production final state -->
      <circle cx="700" cy="390" r="12" fill="#F57C00"/>
      <text x="700" y="395" text-anchor="middle" font-size="10" fill="white">H1</text>
      <circle cx="730" cy="390" r="12" fill="#F57C00"/>
      <text x="730" y="395" text-anchor="middle" font-size="10" fill="white">D</text>
      <text x="800" y="395" font-size="11" fill="#F57C00">← v1.1.1 = H1 + D</text>

      <!-- Final Sync state -->
      <rect x="450" y="430" width="400" height="30" rx="5" fill="#C8E6C9" stroke="#4CAF50"/>
      <text x="650" y="450" text-anchor="middle" font-size="12" fill="#2E7D32">✅ Sync 状态恢复 (main == production)</text>
    </g>
  </g>

  <!-- ==================== 状态机总览 ==================== -->
  <g transform="translate(50, 1230)">
    <rect x="0" y="0" width="1300" height="250" rx="10" fill="#ECEFF1" stroke="#90A4AE" stroke-width="2"/>
    <text x="650" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#37474F">状态机总览：四种状态及其变迁</text>

    <!-- State boxes -->
    <g transform="translate(50, 50)">
      <!-- Sync State -->
      <rect x="0" y="0" width="250" height="80" rx="8" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2"/>
      <text x="125" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Sync</text>
      <text x="125" y="45" text-anchor="middle" font-size="11" fill="#333">main == production</text>
      <text x="125" y="62" text-anchor="middle" font-size="11" fill="#333">v1.0.0 (稳定)</text>

      <!-- MainUpdated State -->
      <rect x="300" y="0" width="250" height="80" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
      <text x="425" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">MainUpdated</text>
      <text x="425" y="45" text-anchor="middle" font-size="11" fill="#333">main 有新功能</text>
      <text x="425" y="62" text-anchor="middle" font-size="11" fill="#333">v1.0.0 → v1.1.0 (待发布)</text>

      <!-- ProdHotfixed State -->
      <rect x="600" y="0" width="250" height="80" rx="8" fill="#FFCDD2" stroke="#F44336" stroke-width="2"/>
      <text x="725" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">ProdHotfixed</text>
      <text x="725" y="45" text-anchor="middle" font-size="11" fill="#333">production 有 hotfix</text>
      <text x="725" y="62" text-anchor="middle" font-size="11" fill="#333">v1.0.0 → v1.0.1 (待同步)</text>

      <!-- BothUpdated State -->
      <rect x="900" y="0" width="250" height="80" rx="8" fill="#FFE0B2" stroke="#FF9800" stroke-width="2"/>
      <text x="1025" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#F57C00">BothUpdated</text>
      <text x="1025" y="45" text-anchor="middle" font-size="11" fill="#333">main 有 D + prod 有 H1</text>
      <text x="1025" y="62" text-anchor="middle" font-size="11" fill="#333">需要两步同步</text>
    </g>

    <!-- Transition arrows -->
    <g transform="translate(50, 150)">
      <!-- Sync -> MainUpdated -->
      <path d="M 250 40 L 300 40" stroke="#2196F3" stroke-width="2" marker-end="url(#arrowSeq)"/>
      <text x="275" y="35" text-anchor="middle" font-size="10" fill="#1565C0">功能合并</text>

      <!-- MainUpdated -> Sync -->
      <path d="M 300 60 L 250 60" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowSeq)"/>
      <text x="275" y="75" text-anchor="middle" font-size="10" fill="#2E7D32">规则 1: 发布</text>

      <!-- Sync -> ProdHotfixed -->
      <path d="M 125 130 L 125 160 L 725 160 L 725 80" stroke="#F44336" stroke-width="2" marker-end="url(#arrowHotfix)"/>
      <text x="425" y="175" text-anchor="middle" font-size="10" fill="#C62828">生产 bug</text>

      <!-- ProdHotfixed -> Sync -->
      <path d="M 600 60 L 550 60" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowSeq)"/>
      <text x="575" y="55" text-anchor="middle" font-size="10" fill="#2E7D32">规则 2: 同步回 main</text>

      <!-- Sync -> BothUpdated -->
      <path d="M 125 130 L 125 160 L 1025 160 L 1025 80" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowSync)"/>
      <text x="575" y="190" text-anchor="middle" font-size="10" fill="#F57C00">main 开发中 + 生产 hotfix</text>

      <!-- BothUpdated -> Sync (two steps) -->
      <path d="M 900 60 L 850 60" stroke="#C62828" stroke-width="2" marker-end="url(#arrowHotfix)"/>
      <text x="875" y="55" text-anchor="middle" font-size="10" fill="#C62828">规则 3:</text>
      <text x="875" y="70" text-anchor="middle" font-size="10" fill="#C62828">Step1+Step2</text>
    </g>

    <!-- Decision tree -->
    <g transform="translate(800, 150)">
      <rect x="0" y="0" width="450" height="80" rx="5" fill="#FAFAFA" stroke="#BDBDBD"/>
      <text x="225" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">决策树</text>
      <text x="20" y="45" font-size="10" fill="#333">1. main 有更新？ → 规则 1</text>
      <text x="20" y="60" font-size="10" fill="#333">2. production 有 hotfix？ → 规则 2</text>
      <text x="20" y="75" font-size="10" fill="#333">3. 双方都有更新？ → 规则 3</text>
    </g>
  </g>
</svg>
