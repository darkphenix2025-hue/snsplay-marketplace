<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="prodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C62828;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">Git Worktree 多线开发架构总览</text>

  <!-- Git Repository -->
  <rect x="50" y="70" width="1100" height="120" rx="10" fill="url(#gitGrad)" opacity="0.1" stroke="#C62828" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828">📁 Git 仓库 (.git) - 共享所有分支引用和对象</text>

  <!-- Main Branch -->
  <rect x="100" y="250" width="280" height="120" rx="8" fill="url(#mainGrad)" stroke="#2E7D32" stroke-width="2"/>
  <text x="240" y="285" text-anchor="middle" font-size="18" font-weight="bold" fill="white">🌿 main 主线</text>
  <text x="240" y="315" text-anchor="middle" font-size="14" fill="white">项目根目录</text>
  <text x="240" y="340" text-anchor="middle" font-size="14" fill="#E8F5E9">稳定开发版</text>
  <text x="240" y="360" text-anchor="middle" font-size="12" fill="#C8E6C9">/projects/snsplay-marketplace</text>

  <!-- Worktree 1 -->
  <rect x="460" y="250" width="280" height="120" rx="8" fill="url(#wtGrad)" stroke="#1565C0" stroke-width="2"/>
  <text x="600" y="285" text-anchor="middle" font-size="18" font-weight="bold" fill="white">🔧 worktree-1</text>
  <text x="600" y="315" text-anchor="middle" font-size="14" fill="white">.worktrees/feature-A</text>
  <text x="600" y="340" text-anchor="middle" font-size="14" fill="#E3F2FD">开发分支 1</text>
  <text x="600" y="360" text-anchor="middle" font-size="12" fill="#BBDEFB">feature/feature-A</text>

  <!-- Worktree 2 -->
  <rect x="820" y="250" width="280" height="120" rx="8" fill="url(#wtGrad)" stroke="#1565C0" stroke-width="2"/>
  <text x="960" y="285" text-anchor="middle" font-size="18" font-weight="bold" fill="white">🔧 worktree-2</text>
  <text x="960" y="315" text-anchor="middle" font-size="14" fill="white">.worktrees/feature-B</text>
  <text x="960" y="340" text-anchor="middle" font-size="14" fill="#E3F2FD">开发分支 2</text>
  <text x="960" y="360" text-anchor="middle" font-size="12" fill="#BBDEFB">feature/feature-B</text>

  <!-- Production (ONLY connected to main) -->
  <rect x="100" y="450" width="280" height="100" rx="8" fill="url(#prodGrad)" stroke="#F57C00" stroke-width="2"/>
  <text x="240" y="485" text-anchor="middle" font-size="18" font-weight="bold" fill="white">🚀 production</text>
  <text x="240" y="515" text-anchor="middle" font-size="14" fill="white">线上稳定版</text>
  <text x="240" y="540" text-anchor="middle" font-size="12" fill="#FFE0B2">已发布标签 (v1.x.x)</text>

  <!-- Connection Lines - Development branches are peers -->
  <line x1="380" y1="310" x2="460" y2="310" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.6"/>
  <line x1="740" y1="310" x2="820" y2="310" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.6"/>

  <!-- Production connection - ONLY from main (vertical line downward) -->
  <line x1="240" y1="370" x2="240" y2="450" stroke="#2E7D32" stroke-width="3" marker-end="url(#arrowheadGreen)" stroke-dasharray="5,3"/>
  <text x="260" y="420" font-size="12" fill="#2E7D32">git tag / git push</text>

  <!-- Shared Git Connection -->
  <line x1="240" y1="250" x2="240" y2="190" stroke="#C62828" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="600" y1="250" x2="600" y2="190" stroke="#C62828" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="960" y1="250" x2="960" y2="190" stroke="#C62828" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="240" y1="190" x2="960" y2="190" stroke="#C62828" stroke-width="2" stroke-dasharray="5,5" opacity="0.3"/>

  <!-- Flow Indicators -->
  <g transform="translate(550, 600)">
    <rect x="0" y="0" width="280" height="80" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
    <text x="140" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">开发流</text>
    <text x="140" y="50" text-anchor="middle" font-size="12" fill="#333">worktree → main (merge)</text>
  </g>

  <g transform="translate(50, 600)">
    <rect x="0" y="0" width="220" height="80" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
    <text x="110" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#F57C00">发布流</text>
    <text x="110" y="50" text-anchor="middle" font-size="12" fill="#333">main → production (tag)</text>
    <text x="110" y="70" text-anchor="middle" font-size="11" fill="#F57C00">⚠️ 仅 main 可发布</text>
  </g>

  <!-- Legend -->
  <g transform="translate(850, 600)">
    <rect x="0" y="0" width="300" height="150" rx="5" fill="#FAFAFA" stroke="#9E9E9E" stroke-width="1"/>
    <text x="150" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">图例说明</text>

    <rect x="15" y="40" width="20" height="20" fill="url(#mainGrad)"/>
    <text x="45" y="55" font-size="12" fill="#333">main 主线 (稳定开发)</text>

    <rect x="15" y="70" width="20" height="20" fill="url(#wtGrad)"/>
    <text x="45" y="85" font-size="12" fill="#333">worktree 开发分支</text>

    <rect x="15" y="100" width="20" height="20" fill="url(#prodGrad)"/>
    <text x="45" y="115" font-size="12" fill="#333">production 线上版本</text>
    <text x="45" y="128" font-size="10" fill="#F57C00">← 仅从 main 发布</text>

    <rect x="15" y="135" width="20" height="15" fill="url(#gitGrad)" opacity="0.3"/>
    <text x="45" y="147" font-size="11" fill="#333">Git 仓库 (共享)</text>
  </g>

  <!-- Key Rule Box -->
  <g transform="translate(380, 450)">
    <rect x="0" y="0" width="380" height="100" rx="8" fill="#FFEBEE" stroke="#F44336" stroke-width="2"/>
    <text x="190" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">⚠️ 关键规则</text>
    <text x="190" y="50" text-anchor="middle" font-size="12" fill="#333">1. worktree 不能直接发布到 production</text>
    <text x="190" y="70" text-anchor="middle" font-size="12" fill="#333">2. 必须先 merge 到 main，验证后再发布</text>
    <text x="190" y="90" text-anchor="middle" font-size="12" fill="#333">3. 所有发布必须通过 main 主线</text>
  </g>
</svg>
